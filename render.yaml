services:
  - type: web
    name: biometric-system
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn financial_portal.wsgi:application"
    envVars:
      - key: SECRET_KEY
        value: "set-a-strong-secret-here"   # override in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: biometric-db
          property: connectionString

databases:
  - name: biometric-db
    databaseName: biometric
    user: biometric_user
