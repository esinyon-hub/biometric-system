services:
  - type: web
    name: biometric-system
    env: python
    buildCommand: ./render-build.sh
    startCommand: gunicorn financial_portal.wsgi:application
    envVars:
      - key: SECRET_KEY
        value: "set-a-strong-secret-here"
      - key: DATABASE_URL
        fromDatabase:
          name: biometric-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: financial_portal.settings
      - key: PYTHON_VERSION
        value: 3.12
databases:
  - name: biometric-db
    databaseName: biometric
    user: biometric_user
